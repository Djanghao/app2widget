# Teacher Data Generation Configuration — Scaled for frontier-beating training

teacher:
  model: "gpt-4o"
  temperature: 0.8
  max_tokens: 4096
  num_samples: 1200

data:
  output_dir: "data"
  dataset_file: "data/dataset.jsonl"
  teacher_screenshots_dir: "data/teacher_screenshots"
  teacher_metadata_dir: "data/teacher_metadata"
  candidates_dir: "data/candidates"

ui_styles:
  # Light themes
  - "Clean and minimal with soft shadows, rounded corners, and a light color palette. Use subtle gradients and ample whitespace."
  - "Warm and friendly with rounded shapes, pastel colors, and playful typography. Approachable design."
  - "Professional and corporate with structured layouts, neutral tones, and clear data hierarchy."
  - "Airy and modern with lots of white space, thin borders, muted blues and grays. Calm and focused."
  - "Playful and colorful with bright primary colors, thick rounded borders, and large friendly fonts."
  - "Elegant and luxurious with serif fonts, gold accents on cream backgrounds, refined spacing."
  - "Scandinavian-inspired with muted earth tones, natural textures, clean geometric shapes."
  - "Neomorphic / soft UI with light gray backgrounds, inset and raised soft shadows, subtle depth."

  # Dark themes
  - "Dark theme with muted backgrounds, glowing accent colors, and sleek typography. Premium feel."
  - "Cyberpunk dark theme with neon green and magenta accents on near-black backgrounds, monospace fonts."
  - "Dark glassmorphism with frosted glass panels, blur effects, translucent overlays, and vibrant gradients."
  - "Midnight blue dark theme with electric blue accents, subtle gradients, and sharp modern typography."
  - "Dark minimal with pure black background, white text, single accent color, ultra-clean lines."

  # Bold / vibrant
  - "Bold and vibrant with strong contrast, vivid accent colors, and prominent typography. Modern and eye-catching."
  - "Retro/vintage with warm sepia tones, rounded retro fonts, subtle paper textures, nostalgic feel."
  - "Brutalist with raw black and white, oversized bold type, sharp edges, no rounded corners."
  - "Gradient-heavy modern with smooth color transitions, floating cards, and depth through color."
  - "Material Design 3 inspired with dynamic color, rounded containers, prominent FABs, and elevation."

  # Platform-specific
  - "iOS-inspired with SF Pro-style fonts, vibrancy effects, system-like cards, and Apple HIG spacing."
  - "Android Material You with pill-shaped elements, tonal colors, large touch targets, and rounded corners."
  - "Windows Fluent with acrylic backgrounds, reveal highlights, and clean segmented layouts."
  - "Dashboard/analytics style with dense data, small fonts, grid layouts, and chart-heavy composition."

